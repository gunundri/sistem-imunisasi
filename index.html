<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puskesmas Gandrungmangu 1 - Register Imunisasi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOReactDOMM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Konfigurasi Khusus Cetak Kertas A4 */
        @media print {
            @page {
                size: A4 portrait;
                /* Margin urutannya: Atas Kanan Bawah Kiri */
                /* Kiri dibuat 2cm khusus untuk ruang jilid */
                margin: 0.5cm 0.5cm 0.5cm 2cm;
            }
            /* Reset tinggi secara paksa agar tidak membuat halaman kosong baru */
            html, body, #root {
                background-color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                zoom: 0.80; /* Skala diperkecil drastis agar muat banyak baris */
                height: auto !important;
                min-height: auto !important;
                overflow: visible !important;
            }
            /* Menghilangkan border pada input saat dicetak agar rapi */
            input, select, textarea {
                border-color: transparent !important;
                background-color: transparent !important;
                padding-left: 0 !important;
                padding-top: 0 !important;
                padding-bottom: 0 !important;
                resize: none;
            }
            /* Menghilangkan bayangan di kertas cetak */
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl {
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // REST API BRIDGE (UNTUK GITHUB PAGES)
        // ==========================================
        // PERHATIAN: GANTI URL DI BAWAH INI DENGAN URL WEB APP GAS ANDA!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdMQMcPA69qle-WotB19dM5RRiEZRGXQS1qb42YaRGcytc3CGGbAeeMSZ0WwSfNI8/exec";

        const server = {
            call: async (method, ...args) => {
                try {
                    // Menggunakan fetch API untuk mengirim POST request ke GAS
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        // Menggunakan text/plain untuk menghindari masalah CORS Preflight
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8', 
                        },
                        body: JSON.stringify({
                            method: method,
                            args: args
                        })
                    });

                    const res = await response.json();
                    
                    if (res.success) {
                        return res;
                    } else {
                        throw new Error(res.message || "Unknown Server Error");
                    }
                } catch (error) {
                    console.error("API Error:", error);
                    throw new Error(error.message || "Gagal terhubung ke server database.");
                }
            }
        };

        // ==========================================
        // COMPONENTS
        // ==========================================

        const Alert = ({ type, message, onClose }) => {
            const colors = type === 'error' ? 'bg-red-100 text-red-800 border-red-200' : 'bg-green-100 text-green-800 border-green-200';
            const icon = type === 'error' ? 'ph-warning-circle' : 'ph-check-circle';
            return (
                <div className={`flex items-start p-4 mb-4 border rounded-lg ${colors}`}>
                    <i className={`${icon} text-xl mr-2 mt-0.5`}></i>
                    <span className="flex-1 font-medium text-sm">{message}</span>
                    {onClose && <button onClick={onClose}><i className="ph-x text-lg hover:opacity-70"></i></button>}
                </div>
            );
        };

        const Loader = () => (
            <div className="flex justify-center items-center py-8">
                <div className="loader border-4 border-gray-200 rounded-full w-8 h-8"></div>
                <span className="ml-3 text-gray-500 font-medium text-sm">Memproses...</span>
            </div>
        );

        // --- View: Login Manual ---
        const Login = ({ onLogin }) => {
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setError(null);
                
                if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbwdMQMcPA69qle-WotB19dM5RRiEZRGXQS1qb42YaRGcytc3CGGbAeeMSZ0WwSfNI8/exec") {
                    setError("URL Google Apps Script belum di-setting di dalam index.html!");
                    setLoading(false);
                    return;
                }

                try {
                    const res = await server.call('checkAuth', e.target.email.value, e.target.password.value);
                    onLogin(res.user, res.token);
                } catch (err) {
                    setError(err.message || "Gagal login. Periksa kembali email dan password Anda.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
                        <div className="text-center mb-8">
                            <div className="w-24 h-24 mx-auto mb-4">
                                <img src="https://site.smpn4kedungreja.sch.id/jurnalgcp/wp-content/uploads/2026/03/Logo_Puskesmas_Tanpa_Background.png" alt="Logo Puskesmas" className="w-full h-full object-contain" />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800">Puskesmas Gandrungmangu 1</h2>
                            <p className="text-gray-500 text-sm mt-1">Register Imunisasi</p>
                        </div>
                        
                        {error && <Alert type="error" message={error} onClose={() => setError(null)} />}
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Email / ID Petugas</label>
                                <input type="email" name="email" required className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="contoh@gmail.com" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" name="password" required className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Masukkan kata sandi" />
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition flex justify-center mt-2">
                                {loading ? <div className="loader border-2 border-white border-t-transparent rounded-full w-5 h-5"></div> : "Masuk Sistem"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- View: Modal Form Pemeriksaan ---
        const ModalPemeriksaan = ({ isOpen, onClose, nik, data, onSave, token }) => {
            const [loading, setLoading] = useState(false);
            const [selectedVaccines, setSelectedVaccines] = useState([]);

            const VACCINE_OPTIONS = [
                "BCG", "Polio 1", "Polio 2", "Polio 3", "Polio 4",
                "DPT 1", "DPT 2", "DPT 3", "DPT 4",
                "PCV 1", "PCV 2", 
                "RV 1", "RV 2", 
                "IPV 1", "IPV 2", 
                "MR 1", "MR 2"
            ];

            useEffect(() => {
                if (isOpen) {
                    if (data && data.imunisasi) {
                        const parsedVaccines = data.imunisasi.split(',').map(s => s.trim()).filter(Boolean);
                        setSelectedVaccines(parsedVaccines);
                    } else {
                        setSelectedVaccines([]);
                    }
                }
            }, [isOpen, data]);

            if(!isOpen) return null;

            const handleToggleVaccine = (vaccine) => {
                setSelectedVaccines(prev => 
                    prev.includes(vaccine) 
                        ? prev.filter(v => v !== vaccine) 
                        : [...prev, vaccine] 
                );
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                const formData = {
                    id: data?.id || "",
                    nik: nik,
                    tglCek: e.target.tglCek.value,
                    bb: e.target.bb.value,
                    tb: e.target.tb.value,
                    imunisasi: selectedVaccines.join(', '), 
                    pengobatan: e.target.pengobatan.value
                };
                try {
                    await server.call('savePemeriksaan', token, formData);
                    onSave();
                    onClose();
                } catch(err) {
                    alert("Error: " + err.message);
                } finally { setLoading(false); }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-blue-50 shrink-0">
                            <h3 className="font-semibold text-blue-800">{data ? 'Edit Pemeriksaan' : 'Tambah Pemeriksaan Baru'}</h3>
                            <button onClick={onClose}><i className="ph-x text-xl text-gray-500 hover:text-red-500"></i></button>
                        </div>
                        <div className="overflow-y-auto p-6">
                            <form id="formPemeriksaan" onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1">Tanggal Pengecekan</label>
                                    <input type="date" name="tglCek" defaultValue={data?.tglCek || new Date().toISOString().split('T')[0]} required className="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-blue-500 text-sm" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Berat Badan (kg)</label>
                                        <input type="number" step="0.1" name="bb" defaultValue={data?.bb} required className="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-blue-500 text-sm" placeholder="Contoh: 4.5" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Tinggi Badan (cm)</label>
                                        <input type="number" step="0.1" name="tb" defaultValue={data?.tb} required className="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-blue-500 text-sm" placeholder="Contoh: 55" />
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-2">Jenis Imunisasi <span className="font-normal text-gray-400">(Bisa pilih lebih dari satu)</span></label>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
                                        {VACCINE_OPTIONS.map(v => (
                                            <label key={v} className={`flex items-center p-2 border rounded-lg cursor-pointer text-sm transition-colors select-none ${selectedVaccines.includes(v) ? 'bg-blue-50 border-blue-500 text-blue-700 font-medium' : 'bg-white border-gray-200 hover:bg-gray-50 text-gray-600'}`}>
                                                <input 
                                                    type="checkbox" 
                                                    className="hidden" 
                                                    checked={selectedVaccines.includes(v)}
                                                    onChange={() => handleToggleVaccine(v)} 
                                                />
                                                <div className={`w-4 h-4 mr-2 rounded border flex items-center justify-center shrink-0 ${selectedVaccines.includes(v) ? 'bg-blue-500 border-blue-500' : 'border-gray-300'}`}>
                                                    {selectedVaccines.includes(v) && <i className="ph-check text-white text-xs"></i>}
                                                </div>
                                                {v}
                                            </label>
                                        ))}
                                    </div>
                                    {selectedVaccines.length === 0 && (
                                        <p className="text-xs text-orange-500 mt-1 mt-2"><i className="ph-warning-circle mr-1"></i>Belum ada imunisasi yang dipilih.</p>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-600 mb-1">Pengobatan / Tindakan</label>
                                    <textarea name="pengobatan" defaultValue={data?.pengobatan || "-"} rows="2" className="w-full px-3 py-2 border rounded-lg focus:ring-1 focus:ring-blue-500 text-sm"></textarea>
                                </div>
                            </form>
                        </div>
                        <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2 shrink-0">
                            <button type="button" onClick={onClose} className="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition border border-gray-200">Batal</button>
                            <button type="submit" form="formPemeriksaan" disabled={loading} className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 flex items-center transition shadow-sm">
                                {loading ? <div className="loader border-2 border-white border-t-transparent rounded-full w-4 h-4 mr-2"></div> : <i className="ph-floppy-disk mr-2"></i>}
                                Simpan Data
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- View: Dashboard (List) ---
        const Dashboard = ({ user, token, onViewDetail }) => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState("");

            const loadData = async () => {
                try {
                    const res = await server.call('getDashboardData', token);
                    setData(res.data);
                } catch(e) { alert(e.message); }
                finally { setLoading(false); }
            };

            useEffect(() => { loadData(); }, []);

            const filteredData = data.filter(b => 
                b.nama.toLowerCase().includes(search.toLowerCase()) || 
                b.nik.includes(search)
            );

            const maskNik = (nik) => {
                if(nik.startsWith("TMP-")) return nik;
                if(nik.length === 16) return nik.substring(0,6) + "******" + nik.substring(12);
                return nik;
            };

            return (
                <div className="p-6 print:hidden">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">Data Bayi & Balita</h1>
                            <p className="text-sm text-gray-500">Master Data Register Imunisasi</p>
                        </div>
                        <button onClick={() => onViewDetail(null)} className="w-full sm:w-auto bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex items-center justify-center text-sm font-medium shadow-sm transition">
                            <i className="ph-plus-circle text-lg mr-2"></i> Register Bayi Baru
                        </button>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b border-gray-100 bg-gray-50">
                            <div className="relative w-full md:w-1/3">
                                <i className="ph-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Cari NIK atau Nama Bayi..." 
                                    className="w-full pl-9 pr-4 py-2 border rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                        </div>

                        {loading ? <Loader /> : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left text-gray-600">
                                    <thead className="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                                        <tr>
                                            <th className="px-6 py-3">NIK / ID Unik</th>
                                            <th className="px-6 py-3">Nama Bayi</th>
                                            <th className="px-6 py-3">Tgl Lahir</th>
                                            <th className="px-6 py-3">Nama Ibu</th>
                                            <th className="px-6 py-3 text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredData.map((row, i) => (
                                            <tr key={i} className="bg-white border-b hover:bg-blue-50 transition">
                                                <td className="px-6 py-4 font-mono text-gray-500 whitespace-nowrap">
                                                    {row.nik.startsWith("TMP-") ? <span className="bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded text-xs border border-yellow-200">{row.nik}</span> : maskNik(row.nik)}
                                                </td>
                                                <td className="px-6 py-4 font-medium text-gray-800 whitespace-nowrap">{row.nama} <span className="text-xs text-gray-400 ml-1">({row.jk})</span></td>
                                                <td className="px-6 py-4 whitespace-nowrap">{row.tglLahir}</td>
                                                <td className="px-6 py-4 whitespace-nowrap">{row.ibu}</td>
                                                <td className="px-6 py-4 text-center">
                                                    <button onClick={() => onViewDetail(row.nik)} className="text-blue-600 hover:text-blue-800 bg-blue-100 px-3 py-1 rounded-md text-xs font-semibold whitespace-nowrap">
                                                        Buka Rekam Medis
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredData.length === 0 && (
                                            <tr><td colSpan="5" className="px-6 py-8 text-center text-gray-500">Tidak ada data ditemukan.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- View: Detail & Riwayat (Master-Detail CRUD & PRINT A4) ---
        const DetailView = ({ nik, token, onBack }) => {
            const [data, setData] = useState({ bayi: {}, riwayat: [] });
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [isNew, setIsNew] = useState(!nik);
            
            // Modal state
            const [modalOpen, setModalOpen] = useState(false);
            const [selectedPemeriksaan, setSelectedPemeriksaan] = useState(null);

            const loadDetail = async () => {
                if(!nik) { setLoading(false); return; }
                try {
                    const res = await server.call('getDetailBayi', token, nik);
                    setData(res.data);
                } catch(e) { alert(e.message); onBack(); }
                finally { setLoading(false); }
            };

            useEffect(() => { loadDetail(); }, [nik]);

            const handleSaveBayi = async (e) => {
                e.preventDefault();
                setSaving(true);
                
                let submitNik = e.target.nik.value.trim();
                
                if (isNew) {
                    if (!submitNik) {
                        submitNik = "TMP-" + Date.now().toString().slice(-8);
                    } else if (submitNik.length !== 16) {
                        alert("Jika NIK diisi, harus berjumlah tepat 16 digit angka. Kosongkan saja jika belum memiliki NIK.");
                        setSaving(false);
                        return;
                    }
                }

                const formData = {
                    nik: submitNik,
                    nama: e.target.nama.value,
                    tglLahir: e.target.tglLahir.value,
                    jk: e.target.jk.value,
                    ayah: e.target.ayah.value,
                    ibu: e.target.ibu.value,
                    alamat: e.target.alamat.value
                };
                try {
                    await server.call('saveBayi', token, formData);
                    if(isNew) {
                        setIsNew(false);
                        alert("Data bayi tersimpan. Silakan catat riwayat pemeriksaan.");
                        onBack(); 
                    } else {
                        alert("Profil bayi diperbarui.");
                    }
                } catch(err) { alert(err.message); }
                finally { setSaving(false); }
            };

            const handleDeletePemeriksaan = async (id) => {
                if(window.confirm(`Hapus catatan pemeriksaan ini?`)) {
                    try {
                        await server.call('deletePemeriksaan', token, id);
                        loadDetail(); 
                    } catch(e) { alert(e.message); }
                }
            };

            if(loading) return <div className="p-10 print:hidden"><Loader /></div>;

            return (
                <div className="p-6 max-w-5xl mx-auto bg-transparent print:p-0">
                    
                    {/* Header Cetak A4 (Kop Surat) - Hanya muncul saat nge-print */}
                    <div className="hidden print:flex items-center justify-center border-b-[3px] border-black pb-2 mb-3">
                        <img src="https://site.smpn4kedungreja.sch.id/jurnalgcp/wp-content/uploads/2026/03/Logo_Puskesmas_Tanpa_Background.png" className="w-16 h-16 object-contain mr-4" />
                        <div className="text-center">
                            <h2 className="text-xl font-bold uppercase tracking-wider text-black">Puskesmas Gandrungmangu 1</h2>
                            <p className="text-xs text-black">JL. Bulusari Sidaurip RT 04 RW 05 Desa Bulusari Gandrungmangu Cilacap</p>
                            <h3 className="text-base font-bold underline mt-1 text-black">Buku Register Imunisasi Bayi & Balita</h3>
                        </div>
                    </div>

                    <div className="flex justify-between items-center mb-4 print:hidden">
                        <button onClick={onBack} className="flex items-center text-sm text-gray-500 hover:text-blue-600 transition">
                            <i className="ph-arrow-left mr-1"></i> Kembali ke Daftar
                        </button>
                        {!isNew && (
                            <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900 flex items-center text-sm font-medium shadow-sm transition">
                                <i className="ph-printer text-lg mr-2"></i> Cetak A4
                            </button>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 print:block">
                        {/* Kiri: Form Induk (Bayi) */}
                        <div className="lg:col-span-1 print:mb-2">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 print:shadow-none print:border-black print:rounded-none print:p-2">
                                <div className="flex items-center gap-2 border-b pb-3 mb-4 print:pb-1 print:mb-2 print:border-black">
                                    <i className="ph-identification-card text-blue-500 text-xl print:text-black"></i>
                                    <h2 className="font-bold text-gray-800 print:text-black print:text-sm">Profil Data Bayi</h2>
                                </div>
                                <form onSubmit={handleSaveBayi} className="space-y-3 print:space-y-1">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">NIK / ID Unik <span className="text-gray-400 font-normal print:hidden">(Kosongkan jika belum ada)</span></label>
                                        <input type="text" name="nik" defaultValue={data.bayi.nik} readOnly={!isNew} className={`w-full px-3 py-2 border rounded-lg text-sm print:text-black print:font-mono print:text-xs print:py-0 print:border-b ${!isNew ? 'bg-gray-100 text-gray-500 print:bg-transparent' : 'focus:ring-1 focus:ring-blue-500'}`} placeholder="ID otomatis jika kosong" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">Nama Lengkap</label>
                                        <input type="text" name="nama" defaultValue={data.bayi.nama} required className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 print:text-black print:font-semibold print:text-xs print:py-0 print:border-b" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 print:gap-2">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">Tgl Lahir</label>
                                            <input type="date" name="tglLahir" defaultValue={data.bayi.tglLahir} required className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 print:text-black print:text-xs print:py-0 print:border-b" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">J. Kelamin</label>
                                            <select name="jk" defaultValue={data.bayi.jk} className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 bg-white print:text-black print:text-xs print:py-0 print:appearance-none print:border-b">
                                                <option value="L">Laki-laki</option>
                                                <option value="P">Perempuan</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">Nama Ayah</label>
                                        <input type="text" name="ayah" defaultValue={data.bayi.ayah} required className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 print:text-black print:text-xs print:py-0 print:border-b" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">Nama Ibu</label>
                                        <input type="text" name="ibu" defaultValue={data.bayi.ibu} required className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 print:text-black print:text-xs print:py-0 print:border-b" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1 print:mb-0 print:text-black">Alamat Domisili</label>
                                        <textarea name="alamat" defaultValue={data.bayi.alamat} required rows="2" className="w-full px-3 py-2 border rounded-lg text-sm focus:ring-1 focus:ring-blue-500 print:text-black print:text-xs print:py-0 print:border-b print:h-6"></textarea>
                                    </div>
                                    <div className="flex gap-2 pt-2 print:hidden">
                                        <button type="submit" disabled={saving} className="flex-1 bg-blue-50 text-blue-700 hover:bg-blue-100 font-semibold py-2 rounded-lg text-sm transition">
                                            {saving ? "Menyimpan..." : "Simpan Profil Bayi"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        {/* Kanan: Tabel Anak (Riwayat Pemeriksaan) */}
                        <div className="lg:col-span-2">
                            {isNew ? (
                                <div className="bg-orange-50 border border-orange-100 rounded-xl p-8 text-center h-full flex flex-col items-center justify-center text-orange-800 print:hidden">
                                    <i className="ph-warning-circle text-4xl mb-3 opacity-50"></i>
                                    <p className="font-medium">Simpan profil bayi terlebih dahulu untuk mulai mencatat riwayat pemeriksaan dan imunisasi.</p>
                                </div>
                            ) : (
                                <div className="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full print:shadow-none print:border-black print:rounded-none print:h-auto print:block">
                                    <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl print:bg-transparent print:border-black print:p-2">
                                        <div className="flex items-center gap-2">
                                            <i className="ph-stethoscope text-green-600 text-xl print:text-black"></i>
                                            <h2 className="font-bold text-gray-800 print:text-black print:text-lg">Catatan Riwayat Medis</h2>
                                        </div>
                                        <button onClick={() => { setSelectedPemeriksaan(null); setModalOpen(true); }} className="bg-green-600 text-white px-3 py-1.5 rounded text-xs font-medium hover:bg-green-700 flex items-center transition shadow-sm print:hidden">
                                            <i className="ph-plus mr-1"></i> Catat Baru
                                        </button>
                                    </div>
                                    <div className="p-0 overflow-x-auto flex-1 print:overflow-visible">
                                        <table className="w-full text-sm text-left text-gray-600 print:text-black print:border-collapse border border-gray-200 print:border-black">
                                            <thead className="text-xs text-gray-500 bg-gray-100 border-b print:bg-gray-200 print:text-black print:font-bold">
                                                <tr>
                                                    <th className="px-4 py-2 print:px-2 print:py-1 print:border print:border-black print:text-[10px]">Tgl Cek</th>
                                                    <th className="px-4 py-2 print:px-2 print:py-1 print:border print:border-black print:text-[10px]">BB/TB</th>
                                                    <th className="px-4 py-2 print:px-2 print:py-1 print:border print:border-black print:text-[10px]">Jenis Imunisasi</th>
                                                    <th className="px-4 py-2 print:px-2 print:py-1 print:border print:border-black print:text-[10px]">Pengobatan</th>
                                                    <th className="px-4 py-2 print:hidden">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {data.riwayat.map((row, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50 print:border-b-black">
                                                        <td className="px-4 py-3 print:px-2 print:py-1 font-medium text-gray-800 whitespace-nowrap print:border print:border-black print:text-[10px]">{row.tglCek}</td>
                                                        <td className="px-4 py-3 print:px-2 print:py-1 whitespace-nowrap print:border print:border-black print:text-[10px]"><span className="font-semibold text-blue-600 print:text-black">{row.bb}</span> kg / <span className="font-semibold text-green-600 print:text-black">{row.tb}</span> cm</td>
                                                        <td className="px-4 py-3 print:px-2 print:py-1 min-w-[120px] print:border print:border-black print:text-[10px]">
                                                            {row.imunisasi && row.imunisasi !== "-" ? row.imunisasi.split(',').map((imun, idx) => (
                                                                <span key={idx} className="inline-block bg-blue-100 text-blue-800 text-xs font-medium px-2 py-0.5 rounded border border-blue-200 mr-1 mb-1 print:bg-transparent print:border-none print:p-0 print:mr-1 print:text-[10px]">
                                                                    {imun.trim()}{idx !== row.imunisasi.split(',').length -1 ? ',' : ''}
                                                                </span>
                                                            )) : <span className="text-gray-400 print:text-black">-</span>}
                                                        </td>
                                                        <td className="px-4 py-3 print:px-2 print:py-1 text-xs print:border print:border-black print:text-[10px]">{row.pengobatan}</td>
                                                        <td className="px-4 py-3 text-right whitespace-nowrap print:hidden">
                                                            <button onClick={() => { setSelectedPemeriksaan(row); setModalOpen(true); }} className="text-blue-500 hover:text-blue-700 p-1">
                                                                <i className="ph-pencil-simple text-lg"></i>
                                                            </button>
                                                            <button onClick={() => handleDeletePemeriksaan(row.id)} className="text-red-400 hover:text-red-600 p-1 ml-1">
                                                                <i className="ph-trash text-lg"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {data.riwayat.length === 0 && (
                                                    <tr><td colSpan="5" className="px-4 py-8 text-center text-gray-400 italic print:border print:border-black">Belum ada catatan riwayat medis.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                        
                                        {/* Tanda Tangan Cetak */}
                                        <div className="hidden print:flex justify-end mt-4 pr-10 print:break-inside-avoid">
                                            <div className="text-center">
                                                <p className="mb-8 text-black print:text-xs">Petugas Imunisasi,</p>
                                                <p className="font-bold underline text-black print:text-xs">___________________________</p>
                                                <p className="text-xs text-black mt-1 print:text-[10px]">NIP. ........................................</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <ModalPemeriksaan 
                        isOpen={modalOpen} 
                        onClose={() => setModalOpen(false)} 
                        nik={data.bayi.nik}
                        data={selectedPemeriksaan}
                        onSave={loadDetail}
                        token={token}
                    />
                </div>
            );
        };

        // --- Main App Container ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeNik, setActiveNik] = useState(null);

            const handleLogin = (loggedInUser, userToken) => {
                setUser(loggedInUser);
                setToken(userToken);
            };

            const handleLogout = () => {
                setUser(null);
                setToken(null);
                setCurrentView('dashboard');
            };

            if (!user) return <Login onLogin={handleLogin} />;

            const openDetail = (nik) => {
                setActiveNik(nik);
                setCurrentView('detail');
            };

            const goDashboard = () => {
                setActiveNik(null);
                setCurrentView('dashboard');
            };

            return (
                <div className="min-h-screen flex flex-col bg-gray-100 print:bg-white print:min-h-0 print:h-auto">
                    <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-30 print:hidden">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center cursor-pointer" onClick={goDashboard}>
                                <div className="w-10 h-10 mr-3">
                                    <img src="https://site.smpn4kedungreja.sch.id/jurnalgcp/wp-content/uploads/2026/03/Logo_Puskesmas_Tanpa_Background.png" alt="Logo Puskesmas" className="w-full h-full object-contain" />
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-bold text-lg tracking-tight text-gray-800 leading-tight">Puskesmas Gandrungmangu 1</span>
                                    <span className="text-xs text-blue-600 font-semibold leading-tight">Register Imunisasi</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <div className="text-sm font-semibold text-gray-800">{user.name}</div>
                                    <div className="text-xs text-gray-500">{user.role}</div>
                                </div>
                                <button onClick={handleLogout} className="text-gray-400 hover:text-red-500 transition" title="Keluar">
                                    <i className="ph-sign-out text-2xl"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-7xl mx-auto print:max-w-none print:w-full print:m-0">
                        {currentView === 'dashboard' && <Dashboard user={user} token={token} onViewDetail={openDetail} />}
                        {currentView === 'detail' && <DetailView nik={activeNik} token={token} onBack={goDashboard} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
